name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate-compose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate docker compose
        run: docker compose -f docker-compose.yml config
      - name: Validate TLS smoke compose (requires MAILER_TLS_SMOKE_CERT_DIR)
        run: MAILER_TLS_SMOKE_CERT_DIR=/tmp docker compose -f docker-compose.tls-smoke.yml -p mf-mailer-tls-smoke config

  gradle:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - name: Gradle test (smoke)
        run: ./gradlew test --no-daemon

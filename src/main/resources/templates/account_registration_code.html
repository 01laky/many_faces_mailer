<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"/><title>Finish registration</title></head>
<body>
<p>Hello {{ user_name }},</p>
<p>Use this code to finish creating your account:</p>
<p style="font-size:24px;font-weight:bold;letter-spacing:4px;">{{ registration_code }}</p>
<p>This code expires in {{ expiry_minutes }} minutes.</p>
<p>Or open this link:</p>
<p><a href="{{ action_link|raw }}">Complete registration</a></p>
<p>If you did not request this, you can ignore this message.</p>
</body>
</html>

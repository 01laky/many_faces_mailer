# Local development: Java gRPC mailer + Mailpit (SMTP sink). Attach mailer-worker-dev to many_faces_main_dev-network
# from the monorepo (./scripts/start-all-dev.sh with ENABLE_MAILER_WORKER=1) so be-demo-dev can reach mailer-worker:50054.
services:
  mailpit:
    image: axllent/mailpit:latest
    container_name: mailpit-dev
    ports:
      - "${MAILPIT_SMTP_HOST_PORT:-51025}:1025"
      - "${MAILPIT_UI_HOST_PORT:-58025}:8025"
    restart: "no"

  mailer-worker:
    build:
      context: .
      dockerfile: Dockerfile
    image: many-faces-mailer-worker:dev
    container_name: mailer-worker-dev
    environment:
      - JAVA_TOOL_OPTIONS=-XX:MaxRAMPercentage=75.0
      - MAILER_WORKER_GRPC_LISTEN=:50054
      - MAILER_SMTP_HOST=mailpit
      - MAILER_SMTP_PORT=1025
      - MAILER_SMTP_STARTTLS=false
      - MAILER_FROM_EMAIL=no-reply@example.invalid
      - MAILER_FROM_DISPLAY_NAME=Many Faces Dev
      - MAILER_DEFAULT_LOCALE=en
    ports:
      - "${MAILER_WORKER_GRPC_HOST_PORT:-59204}:50054"
    depends_on:
      - mailpit
    restart: "no"
